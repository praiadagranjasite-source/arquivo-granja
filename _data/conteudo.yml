figuras:
  - nome: "Sophia de Mello Breyner"
    imagem: "https://praiadagranja.wixsite.com/inicio/mello"
    bio: "A poetisa que imortalizou o mar e a infância na Granja.
    De todos os cantos do mundo
    Amo com um amor mais forte e mais profundo Aquela praia extasiada e nua
    Onde me uni ao mar, ao vento e à lua.
    Há muito que deixei aquela praia
    De grandes areais e grandes vagas
    Mas sou eu ainda quem na brisa respira
    E é por mim que espera cintilando a maré vasa."
 
  - nome: "Eça de Queirós"
    imagem: "https://via.placeholder.com/400x300"
    bio: "O grande romancista que encontrou na Granja o seu refúgio."
  - nome: "Ramalho Ortigão"
    imagem: "https://via.placeholder.com/400x300"
    bio: "Escritor e crítico, impulsionador da Granja balnear."
  - nome: "Antero de Quental"
    imagem: "https://via.placeholder.com/400x300"
    bio: "O filósofo e poeta que frequentava os verões da nossa praia."
  - nome: "Rei D. Luís I"
    imagem: "https://via.placeholder.com/400x300"
    bio: "A presença da Família Real que deu distinção à Granja."
    
