figuras:
  - nome: "Sophia de Mello Breyner"
    imagem: "https://via.placeholder.com/400x300"
    bio: "A poetisa que imortalizou o mar e a infância na Granja nas suas obras 'Coral' e 'O Nu na Antiguidade'."
  - nome: "Eça de Queirós"
    imagem: "https://via.placeholder.com/400x300"
    bio: "O grande romancista que retratou a alta sociedade da época e encontrou na Granja o seu refúgio de verão."
  - nome: "Ramalho Ortigão"
    imagem: "https://via.placeholder.com/400x300"
    bio: "Escritor e crítico, foi um dos grandes impulsionadores da Granja como estância balnear de elite."
  - nome: "Antero de Quental"
    imagem: "https://via.placeholder.com/400x300"
    bio: "O filósofo e poeta que, juntamente com a Geração de 70, frequentava os verões da nossa praia."
  - nome: "Rei D. Luís I"
    imagem: "https://via.placeholder.com/400x300"
    bio: "A presença frequente da Família Real foi o selo de distinção que transformou a Granja na 'Praia dos Reis'."
