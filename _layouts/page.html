---
layout: default
---
<style>
  /* Tamanho de letra confortável para leitura */
  .post-content {
    font-size: 1.3rem; 
    line-height: 1.6;
    color: #1a1a1a;
    margin-top: 30px;
  }

  /* Painel de Áudio Compacto no Topo */
  .audio-control-panel {
    background: #f0f7ff;
    border: 2px solid #007bff;
    border-radius: 12px;
    padding: 15px;
    margin: 20px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
  }

  .btn-audio {
    padding: 10px 20px;
    border: none;
    border-radius: 25px;
    font-weight: bold;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.2s;
  }

  .btn-audio:active { transform: scale(0.95); }

  #btn-ouvir { background: #007bff; color: white; }
  #btn-parar { background: #dc3545; color: white; display: none; }

  .status-voz {
    font-size: 0.9rem;
    color: #0056b3;
    font-weight: bold;
  }
</style>

<article class="post">
  <h1 style="font-size: 2.4rem; margin-bottom: 10px; color: #2c3e50;">{{ page.title }}</h1>
  
  <div class="audio-control-panel">
    <span class="status-voz">🔊 Ouvir Biografia:</span>
    
    <button id="btn-ouvir" class="btn-audio">
      ▶️ Reproduzir
    </button>
    
    <button id="btn-parar" class="btn-audio">
      🛑 Parar
    </button>
  </div>

  <div class="post-content" id="texto-biografia">
    {{ content }}
  </div>
</article>

<script>
  const btnOuvir = document.getElementById('btn-ouvir');
  const btnParar = document.getElementById('btn-parar');

  btnOuvir.onclick = function() {
    // 1. Cancela qualquer voz que esteja a decorrer
    window.speechSynthesis.cancel();

    // 2. Captura o texto
    const texto = document.getElementById('texto-biografia').innerText;
    const fala = new SpeechSynthesisUtterance(texto);
    fala.lang = 'pt-PT'; // Voz de Portugal
    fala.rate = 1.0;

    // 3. Inicia a fala
    window.speechSynthesis.speak(fala);

    // 4. Muda o estado dos botões
    btnOuvir.style.display = 'none';
    btnParar.style.display = 'flex';

    // Quando terminar, volta ao estado inicial
    fala.onend = () => {
      btnOuvir.style.display = 'flex';
      btnParar.style.display = 'none';
    };
  };

  btnParar.onclick = function() {
    window.speechSynthesis.cancel();
    btnOuvir.style.display = 'flex';
    btnParar.style.display = 'none';
  };
</script>
