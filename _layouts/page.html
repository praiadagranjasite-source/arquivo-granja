---
layout: default
---
<style>
  /* --- 1. RESOLVER O TAMANHO DA LETRA --- */
  .post-content {
    font-size: 1.35rem !important; /* Letra muito maior e mais legível */
    line-height: 1.65 !important;
    color: #222 !important;
    font-family: sans-serif; /* Garante uma fonte limpa */
    margin-top: 25px;
  }

  /* --- 2. CRIAR O DESIGN DA TUA IMAGEM --- */
  /* Contentor dos Ícones lado a lado */
  .icones-topo {
    display: flex;
    align-items: center;
    justify-content: flex-start; /* Alinhados à esquerda */
    gap: 15px; /* Espaço entre a estrela e o som */
    margin-bottom: 20px;
  }

  /* Estilo da Estrela Azul flutuante */
  .estrela-azul {
    width: 25px;
    height: 25px;
    background-color: #007bff; /* Azul */
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); /* Forma de Estrela */
  }

  /* Estilo do Botão de Altifalante */
  .botao-som {
    font-size: 20px; /* Tamanho do ícone */
    color: #444; /* Cor cinza como na imagem */
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    line-height: 1;
  }

  .botao-som:hover { color: #007bff; } /* Azul ao passar o rato */
  .botao-som:active { transform: scale(0.95); } /* Animação ao clicar */
</style>

<article class="post">
  <h1 style="font-size: 2.5rem; margin-bottom: 5px; color: #1a1a1a;">{{ page.title }}</h1>
  
  <div class="icones-topo">
    <div class="estrela-azul"></div>
    
    <button id="btn-audio-top" class="botao-som" title="Clica para ouvir a biografia">🔊</button>
  </div>

  <div class="post-content" id="texto-biografia">
    {{ content }}
  </div>
</article>

<script>
  let isPlaying = false; // Controlo de estado (se está a tocar ou não)

  document.getElementById('btn-audio-top').onclick = function() {
    // 1. Se estiver a tocar, para imediatamente
    if (isPlaying) {
      window.speechSynthesis.cancel();
      isPlaying = false;
      this.innerHTML = "🔊"; // Volta a mostrar o som normal
      this.style.color = "#444";
      this.title = "Clica para ouvir a biografia";
      return; // Sai da função
    }

    // 2. Se não estiver a tocar, começa a ler
    window.speechSynthesis.cancel(); // Cancela vozes antigas
    
    const texto = document.getElementById('texto-biografia').innerText;
    const fala = new SpeechSynthesisUtterance(texto);
    fala.lang = 'pt-PT'; // Voz de Portugal

    window.speechSynthesis.speak(fala);
    isPlaying = true;
    
    // 3. Muda o ícone para "Parar" (ex: um botão de paragem)
    this.innerHTML = "🛑"; 
    this.style.color = "#dc3545"; // Vermelho para indicar "Parar"
    this.title = "Clica para parar a leitura";

    // 4. Quando a voz terminar sozinha, volta ao normal
    fala.onend = () => {
      isPlaying = false;
      this.innerHTML = "🔊";
      this.style.color = "#444";
      this.title = "Clica para ouvir a biografia";
    };
  };
</script>
