---
layout: default
---
<style>
  /* FORÇAR TAMANHO DA LETRA - O !important obriga o tema a mudar */
  body, .post, .post-content, p, li {
    font-size: 1.4rem !important; /* Letra bem grande */
    line-height: 1.7 !important;
    color: #1a1a1a !important;
  }

  .post-title, h1 {
    font-size: 2.8rem !important;
    margin-bottom: 10px !important;
  }

  /* CONTENTOR DO ÍCONE NO CANTO DIREITO */
  .header-com-audio {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #eee;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }

  /* O ÍCONE DE COLUNA (ALTIFALANTE) */
  .botao-coluna {
    font-size: 35px; /* Ícone grande para ser fácil de clicar */
    cursor: pointer;
    background: none;
    border: none;
    padding: 10px;
    transition: transform 0.2s;
  }

  .botao-coluna:active { transform: scale(0.9); }
</style>

<article class="post">
  <div class="header-com-audio">
    <h1>{{ page.title }}</h1>
    
    <button id="btn-coluna" class="botao-coluna" title="Ouvir">🔊</button>
  </div>

  <div class="post-content" id="texto-biografia">
    {{ content }}
  </div>
</article>

<script>
  let falando = false;

  document.getElementById('btn-coluna').onclick = function() {
    if (falando) {
      window.speechSynthesis.cancel();
      falando = false;
      this.innerHTML = "🔊";
      return;
    }

    window.speechSynthesis.cancel();
    
    // Captura o texto da biografia
    const texto = document.getElementById('texto-biografia').innerText;
    const msg = new SpeechSynthesisUtterance(texto);
    msg.lang = 'pt-PT';

    window.speechSynthesis.speak(msg);
    falando = true;
    this.innerHTML = "🛑"; // Muda para parar enquanto fala

    msg.onend = () => {
      falando = false;
      this.innerHTML = "🔊";
    };
  };
</script>
